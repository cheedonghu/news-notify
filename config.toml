[telegram]
api_token = "token"
chat_id = "id"

[features]
# 新帖推送开关
v2ex_fetch_latest = false
# 新帖推送关键字过滤（满足才会推送）
v2ex_fetch_latest_keyword = ["键盘", "大模型"]
# 新帖推送节点过滤。和上面的关键字是与的关系
v2ex_fetch_latest_node_name = ["movie", "share"]
# 热帖推送开关
v2ex_fetch_hot = false
# hacker news top贴推送开关
hn_fetch_top = true
hn_fetch_latest=false
# 仅解析前5个的hacker news top帖子
hn_fetch_num = 1
# hacker news目标帖子距今时间（hacker news的top算法可能导致大量新帖冒出） 单位:H
hn_fetch_time_gap = 1

[deepseek]
api_token="key"
